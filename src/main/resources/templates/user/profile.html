<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Profile Saya</h4>
                </div>
                <div class="card-body">

                    <!-- Flash message sukses (dari redirect change-password) -->
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <p><strong>Username:</strong> <span th:text="${username}"></span></p>

                    <hr>

                    <!-- Link ke halaman Ganti Password -->
                    <a th:href="@{/change-password}" class="btn btn-warning">
                        Ganti Password
                    </a>

                    <a th:href="@{/products}" class="btn btn-secondary ms-2">
                        Kembali ke Produk
                    </a>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
