<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Ganti Password</h4>
                </div>
                <div class="card-body">

                    <!-- Flash message error -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <!-- Flash message sukses -->
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="post">

                        <!-- Password Lama -->
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">Password Lama</label>
                            <input type="password"
                                   id="oldPassword"
                                   th:field="*{oldPassword}"
                                   class="form-control"
                                   placeholder="Masukkan password lama"
                                   required>
                        </div>

                        <!-- Password Baru -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Password Baru</label>
                            <input type="password"
                                   id="newPassword"
                                   th:field="*{newPassword}"
                                   class="form-control"
                                   placeholder="Masukkan password baru"
                                   required>
                        </div>

                        <!-- Konfirmasi Password Baru -->
                        <div class="mb-3">
                            <label for="confirmNewPassword" class="form-label">Konfirmasi Password Baru</label>
                            <input type="password"
                                   id="confirmNewPassword"
                                   th:field="*{confirmNewPassword}"
                                   class="form-control"
                                   placeholder="Ulangi password baru"
                                   required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/profile}" class="btn btn-secondary">Kembali ke Profile</a>
                            <button type="submit" class="btn btn-warning">Simpan Password</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
